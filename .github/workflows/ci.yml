name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
          - os: macos-14
            name: darwin-aarch64
          - os: windows-latest
            name: win64

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libncurses-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-gcc

      - name: Configure & Build (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFB_STANDALONE=ON
          cmake --build build

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFB_STANDALONE=ON
          cmake --build build

      - name: Test fbc
        if: runner.os != 'Windows'
        run: ./build/src/compiler/fbc --version

  amiga-test:
    name: AmigaOS m68k (cross-compile check)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build fbc
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build libncurses-dev
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFB_STANDALONE=ON
          cmake --build build

      - name: Test Amiga target generates valid C
        run: |
          echo 'Print "Hello Amiga!"' > /tmp/hello.bas
          ./build/src/compiler/fbc -gen gcc -r -m hello -target amiga-m68k /tmp/hello.bas
          echo "Generated C code:"
          cat /tmp/hello.c
          grep -q "fb_PrintString" /tmp/hello.c && echo "✅ Amiga C generation works!"

      - name: Test all Amiga targets
        run: |
          for target in amiga aros-x86_64 aros-aarch64 morphos amigaos4; do
            echo -n "$target: "
            ./build/src/compiler/fbc -gen gcc -r -m hello -target $target /tmp/hello.bas 2>&1 && echo "✅" || echo "❌"
          done
