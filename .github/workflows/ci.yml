name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
          - os: macos-14
            name: darwin-aarch64
          - os: windows-latest
            name: win64

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libncurses-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-gcc

      - name: Configure & Build (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFB_STANDALONE=ON -DFB_BUILD_GFXLIB=OFF
          cmake --build build

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFB_STANDALONE=ON -DFB_BUILD_GFXLIB=OFF
          cmake --build build

      - name: Test fbc
        if: runner.os != 'Windows'
        run: ./build/src/compiler/fbc --version

  amiga-test:
    name: AmigaOS m68k (cross + vamos)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache amiga-gcc
        id: cache-amiga-gcc
        uses: actions/cache@v4
        with:
          path: /opt/amiga
          key: amiga-gcc-6.5.0b-ubuntu24-v2

      - name: Build amiga-gcc (if not cached)
        if: steps.cache-amiga-gcc.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y             build-essential autoconf automake texinfo git lhasa libgmp-dev             libmpfr-dev libmpc-dev gettext
          git clone --depth 1 --recursive https://franke.ms/git/bebbo/amiga-gcc /tmp/amiga-gcc
          cd /tmp/amiga-gcc
          make all PREFIX=/opt/amiga -j$(nproc) 2>&1 | tail -5

      - name: Add amiga-gcc to PATH
        run: echo "/opt/amiga/bin" >> $GITHUB_PATH

      - name: Install host tools
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build libncurses-dev
          pip install amitools machine68k

      - name: Build fbc (host)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFB_STANDALONE=ON -DFB_BUILD_GFXLIB=OFF
          cmake --build build

      - name: Cross-compile and test with vamos
        run: |
          cat > /tmp/test.bas << 'FBEOF'
          Print "FreeBASIC on AmigaOS!"
          Print "2 + 2 ="; 2 + 2
          Dim s As String
          s = "works"
          Print "It "; s; "!"
          Print "TEST PASSED"
          FBEOF

          SYSROOT=/opt/amiga/m68k-amigaos
          CFLAGS="-m68020 -msoft-float -fno-common -isystem $SYSROOT/ndk-include -isystem $SYSROOT/sys-include -O2 -fno-builtin"

          ./build/src/compiler/fbc -gen gcc -r -m test -target amiga-m68k /tmp/test.bas
          m68k-amigaos-gcc $CFLAGS -c /tmp/test.c -o /tmp/test.o
          m68k-amigaos-gcc $CFLAGS -c src/rtlib/amiga/fb_amiga_rt.c -o /tmp/fb_amiga_rt.o
          m68k-amigaos-gcc $CFLAGS -c src/rtlib/amiga/mathbase_stub.c -o /tmp/mathbase_stub.o
          m68k-amigaos-gcc $CFLAGS -c src/rtlib/amiga/sprintf.c -o /tmp/sprintf.o
          m68k-amigaos-as src/rtlib/amiga/startup.s -o /tmp/startup.o

          m68k-amigaos-gcc $CFLAGS -nostdlib             /tmp/startup.o /tmp/test.o /tmp/mathbase_stub.o /tmp/sprintf.o /tmp/fb_amiga_rt.o             test/amiga/libfbsoftfloat000.a test/amiga/libfbintmath.a             -o /tmp/test_amiga

          file /tmp/test_amiga
          OUTPUT=$(vamos -C 68020 /tmp/test_amiga 2>/dev/null)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "TEST PASSED" || (echo "❌ FAIL" && exit 1)
          echo "✅ AmigaOS cross-compile + vamos test passed!"
